# CI: Build pre-compiled timu-pair binaries and attach to GitHub Release.
#
# Triggers on tag push: v* (e.g. v0.1.0)
# Builds for: linux-x64, linux-arm64, darwin-x64, darwin-arm64
# Uploads each as a release asset named timu-pair-{platform}-{arch}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to upload release assets

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: timu-pair-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: timu-pair-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: timu-pair-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: timu-pair-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build timu-pair
        working-directory: timu-pair
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp timu-pair/target/${{ matrix.target }}/release/timu-pair \
             timu-pair/target/${{ matrix.target }}/release/${{ matrix.asset }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: timu-pair/target/${{ matrix.target }}/release/${{ matrix.asset }}
          fail_on_unmatched_files: true